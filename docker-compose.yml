services:
  stt-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: stt-translator-service:latest
    container_name: stt-translator-service
    ports:
      - "8000:8000"
    environment:
      # Hugging Face model settings
      STT_MODEL_REPO: ${STT_MODEL_REPO:-ai-sage/GigaAM-v3}
      STT_MODEL_REVISION: ${STT_MODEL_REVISION:-e2e_rnnt}
      STT_DEVICE: ${STT_DEVICE:-cuda}
      # Maximum accepted audio file size (bytes) — default 50 MB
      STT_MAX_AUDIO_SIZE_BYTES: ${STT_MAX_AUDIO_SIZE_BYTES:-52428800}
    volumes:
      # Cache downloaded model weights between container restarts
      - huggingface_cache:/root/.cache/huggingface
      - ./.resources:/app/.resources
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface_cache:
