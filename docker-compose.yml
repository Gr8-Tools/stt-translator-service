services:
  stt-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODE_CACHEBUST: ${CODE_CACHEBUST:-11}
    image: stt-translator-service:latest
    container_name: stt-translator-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Model and device settings
      STT_MODEL_REVISION: ${STT_MODEL_REVISION:-e2e_rnnt}
      STT_DEVICE: ${STT_DEVICE:-cuda}
      # Maximum accepted audio file size (bytes) — default 50 MB
      STT_MAX_AUDIO_SIZE_BYTES: ${STT_MAX_AUDIO_SIZE_BYTES:-52428800}
      # Hugging Face offline/cache settings (see .env)
      HF_HOME: ${HF_HOME:-/root/.cache/huggingface}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
    volumes:
      # Cache downloaded model weights between container restarts
      - hf_cache:/root/.cache/huggingface
      - ./.resources:/app/.resources
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf_cache:
